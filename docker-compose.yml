services:
  db:
    image: postgres:16-alpine
    container_name: plants_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plants -d plants"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    image: node:24-alpine
    container_name: plants_web
    working_dir: /app
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./uploads:/app/uploads
      - next_cache:/app/.next
    command: >
      sh -lc "
        if [ ! -f package.json ]; then
          echo 'ERROR: В /app нет package.json. Сначала создай Next проект (npx create-next-app@latest .)'; exit 1;
        fi;

        if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then
          echo 'Installing dependencies...';
          npm install;
        fi;

        if [ -d prisma ]; then
          echo 'Running Prisma generate/migrate...';
          npx prisma generate || true;
          npx prisma migrate dev --name init || true;
        else
          echo 'No prisma/ dir yet — skipping migrate';
        fi;

        npm run dev
      "

volumes:
  pgdata:
  node_modules:
  next_cache:
